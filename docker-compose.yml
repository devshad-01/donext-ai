services:
  donext-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: donext-ai
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
